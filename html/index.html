<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Top Games</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
tailwind.config = {
    theme: {
        extend: {
            colors: {
                // Dark Background System
                dark: {
                    950: '#050816', // template background اصلی
                    900: '#0a0a0f',
                    800: '#111827', // template card اصلی
                    700: '#1a1a2e',
                    600: '#16213e',
                    500: '#1e293b'
                },

                // Neon Gaming Accent System
                neon: {
                    cyan: '#00d4ff',
                    purple: '#a100d6', // template primary merge شده
                    violet: '#7b2cbf',
                    pink: '#ff006e',
                    green: '#22c55e',
                    orange: '#f59e0b',
                    red: '#ef4444',
                    blue: '#007bff' // template primarybtn merge شده
                },

                // Text System
                text: {
                    main: '#ffffff',
                    soft: '#cbd5e1',
                    muted: '#94a3b8'
                }
            },

            fontFamily: {
                sans: ['Inter', 'system-ui', 'sans-serif'],
            },

            animation: {
                'float': 'float 15s infinite',
                'glow': 'glow 3s ease-in-out infinite alternate',
                'fade-in-up': 'fadeInUp 0.6s ease-out forwards',
                'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            },

            keyframes: {
                float: {
                    '0%, 100%': { transform: 'translateY(100vh) rotate(0deg)', opacity: '0' },
                    '10%': { opacity: '1' },
                    '90%': { opacity: '1' },
                    '100%': { transform: 'translateY(-10vh) rotate(720deg)', opacity: '0' },
                },

                glow: {
                    from: { filter: 'drop-shadow(0 0 10px rgba(0,212,255,0.35))' },
                    to: { filter: 'drop-shadow(0 0 30px rgba(161,0,214,0.55))' },
                },

                fadeInUp: {
                    from: { opacity: '0', transform: 'translateY(30px)' },
                    to: { opacity: '1', transform: 'translateY(0)' },
                }
            }
        }
    }
}
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-dark-900 text-gray-200 min-h-screen overflow-x-hidden relative selection:bg-neon-cyan/30 selection:text-white">

    <!-- Animated Particles Background -->
    <div id="particles" class="fixed inset-0 pointer-events-none z-0 overflow-hidden"></div>

    <!-- Hero Section with Aurora-style gradient -->
    <section class="relative z-10 text-center px-5 pt-24 pb-20">
        <div class="absolute inset-0 bg-gradient-to-b from-neon-blue/10 via-transparent to-transparent pointer-events-none"></div>
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[600px] h-[400px] bg-neon-purple/20 rounded-full blur-[120px] pointer-events-none"></div>
        
        <div class="relative">
            <h1 class="text-5xl sm:text-6xl md:text-7xl lg:text-8xl font-black gradient-text tracking-tight mb-6 animate-glow leading-tight">
                Discover Top Games
            </h1>
            <p class="text-base sm:text-lg md:text-xl text-gray-400 max-w-2xl mx-auto leading-relaxed px-4">
                Explore the most downloaded, searched, and newly released games. Your next adventure starts here.
            </p>
            
        
        </div>
    </section>

    <!-- Most Downloaded Section -->
    <section id="downloaded" class="relative z-10 px-4 sm:px-6 lg:px-8 py-12 max-w-7xl mx-auto">
        <div class="flex items-center gap-4 mb-10 px-2">

            <div>
                <h2 class="text-2xl sm:text-3xl font-bold text-white">Most Downloaded In <strong>2025</strong> </h2>
                <p class="text-sm text-gray-400 mt-1">The games everyone is playing right now</p>
            </div>
        </div>
        <div id="downloaded-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 px-2"></div>
    </section>

    <!-- Divider with gradient -->
    <div class="h-px bg-gradient-to-r from-transparent via-neon-cyan/20 to-transparent max-w-5xl mx-auto my-6"></div>

    <!-- Most Searched Section -->
    <section id="searched" class="relative z-10 px-4 sm:px-6 lg:px-8 py-12 max-w-7xl mx-auto">
        <div class="flex items-center gap-4 mb-10 px-2">

            <div>
                <h2 class="text-2xl sm:text-3xl font-bold text-white">Most Searched</h2>
                <p class="text-sm text-gray-400 mt-1">Trending searches from gamers worldwide</p>
            </div>
        </div>
        <div id="searched-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 px-2"></div>
    </section>

    <!-- Divider -->
    <div class="h-px bg-gradient-to-r from-transparent via-neon-purple/20 to-transparent max-w-5xl mx-auto my-6"></div>

    <!-- Newly Added Section -->
    <section id="newly" class="relative z-10 px-4 sm:px-6 lg:px-8 py-12 max-w-7xl mx-auto">
        <div class="flex items-center gap-4 mb-10 px-2">

            <div>
                <h2 class="text-2xl sm:text-3xl font-bold text-white">Newly Added</h2>
                <p class="text-sm text-gray-400 mt-1">Fresh releases you don't want to miss</p>
            </div>
        </div>
        <div id="newly-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 px-2"></div>
    </section>

    <script src="../js/script.js"></script>
</body>
</html>
