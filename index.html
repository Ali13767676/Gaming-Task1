                },

                // Text System
                text: {
                    main: '#ffffff',
                    soft: '#cbd5e1',
                    muted: '#94a3b8'
                }
            },

            fontFamily: {
                sans: ['Inter', 'system-ui', 'sans-serif'],
            },

            animation: {
                'float': 'float 15s infinite',
                'glow': 'glow 3s ease-in-out infinite alternate',
                'fade-in-up': 'fadeInUp 0.6s ease-out forwards',
                'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            },

            keyframes: {
                float: {
                    '0%, 100%': { transform: 'translateY(100vh) rotate(0deg)', opacity: '0' },
                    '10%': { opacity: '1' },
                    '90%': { opacity: '1' },
                    '100%': { transform: 'translateY(-10vh) rotate(720deg)', opacity: '0' },
                },

                glow: {
                    from: { filter: 'drop-shadow(0 0 10px rgba(0,212,255,0.35))' },
                    to: { filter: 'drop-shadow(0 0 30px rgba(161,0,214,0.55))' },
                },

                fadeInUp: {
                    from: { opacity: '0', transform: 'translateY(30px)' },
                    to: { opacity: '1', transform: 'translateY(0)' },
                }
            }
        }
    }
}

        .card-hover:hover {

        .btn-ripple {

        }
        .btn-ripple::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 0; height: 0;
            background: rgba(255,255,255,0.25);
            border-radius: 50%;
            transform: translate(-50%, -50%);

        .btn-ripple:active::after {

        // = CARD COMPONENT =
        function createCard(game, index) {
            const btnIcon = game.buttonText === "Play Now" ? icons.play : icons.downloadBtn;

            return `

                    <!-- Image with zoom effect -->

                        <img src="${game.image}" alt="${game.title}" class="w-full h-48 object-cover" loading="lazy">
                        <div class="absolute inset-0 bg-gradient-to-t from-dark-900/60 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                    </div>
                    
                    <!-- Card Content -->

                        <!-- Category Badge -->
                        
                        <!-- Title -->
                        <h3 class="text-lg font-bold text-white mb-2 truncate group-hover:text-neon-cyan transition-colors duration-300">
                            ${game.title}
                        </h3>
                        
                        <!-- Meta info -->

                            ${icons[game.metaIcon]}
                            <span>${game.meta}</span>
                        </div>
                        
                        <!-- Action Button -->

                            onclick="handleAction('${game.title}', '${game.buttonText}')" 
                            class="btn-ripple w-full py-3 rounded-xl font-semibold text-white text-sm bg-gradient-to-r ${game.buttonGradient} ${game.buttonShadow} hover:-translate-y-0.5 transition-all duration-300 flex items-center justify-center gap-2"
                        >
                            ${btnIcon}
                            ${game.buttonText}
                        </button>
                    </div>
                </div>
            `;
        }

        // = RENDER SECTIONS =
        function renderSection(games, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = games.map((game, index) => createCard(game, index)).join('');
        }

        // = INITIALIZE =
        function init() {
            renderSection(mostDownloaded, 'downloaded-grid');
            renderSection(mostSearched, 'searched-grid');
            renderSection(newlyAdded, 'newly-grid');
            createParticles();
        }

        // = PARTICLES =
        function createParticles() {
            const container = document.getElementById('particles');
            const particleCount = window.innerWidth < 768 ? 15 : 30;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                const size = 2 + Math.random() * 4;
                particle.className = 'absolute rounded-full animate-float';
                particle.style.cssText = `
                    left: ${Math.random() * 100}%;
                    width: ${size}px;
                    height: ${size}px;
                    background: rgba(0, 212, 255, ${0.2 + Math.random() * 0.3});
                    animation-delay: ${Math.random() * 15}s;
                    animation-duration: ${10 + Math.random() * 10}s;
                `;
                container.appendChild(particle);
            }
        }


        // ===================== INTERSECTION OBSERVER for scroll animations =====================
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -50px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.animationPlayState = 'running';
                }
            });
        }, observerOptions);

        // ===================== RUN =====================
        document.addEventListener('DOMContentLoaded', init);
